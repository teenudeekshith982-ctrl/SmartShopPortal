<div class="profile-page">

  @if(user){

  <div class="container py-5">

    <div class="profile-card shadow">

      <div class="profile-header">

        <img
          [src]="user.image"
          alt="Profile Image"
          class="profile-image">

        <h2>
          {{ user.firstName }} {{ user.lastName }}
        </h2>

        <p>
          {{ user.email }}
        </p>

      </div>

      <div class="row g-4 p-4">

        <div class="col-md-6">

          <div class="info-card">

            <h4>Personal Information</h4>

            <div class="info-item">
              <label>First Name:</label>
              <span>{{ user.firstName }}</span>
            </div>

            <div class="info-item">
              <label>Last Name: </label>
              <span>{{ user.lastName }}</span>
            </div>

            <div class="info-item">
              <label>Username: </label>
              <span>{{ user.username }}</span>
            </div>

          </div>

        </div>

        <div class="col-md-6">

          <div class="info-card">

            <h4>Account Details</h4>

            <div class="info-item">
              <label>User ID: </label>
              <span>{{ user.id }}</span>
            </div>

            <div class="info-item">
              <label>Email: </label>
              <span>{{ user.email }}</span>
            </div>

            <div class="info-item">
              <label>Role:  </label>
              <span>User</span>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  }

</div>
